<div class="container">
  <h1>Hero Form</h1>
  <form (ngSubmit)="onSubmit()" #heroForm="ngForm">
    {{ myhero | json }}
    <div class="form-group">
      <label for="name">Name</label>
      <input
        type="text"
        class="form-control"
        id="name"
        [(ngModel)]="myhero.name"
        name="name">
    </div>
    <br>
    <div class="form-group">
      <label for="alterEgo">Alter Ego</label>
      <input
        type="text"
        class="form-control"
        id="alterEgo"
        [(ngModel)]="myhero.alterEgo"
        name="alterEgo">
    </div>
    <div class="form-group">
      <label for="power">Hero Power</label>
      <select
        class="form-control"
        id="power"
        required
        [(ngModel)]="myhero.power"
        name="power">
        <option *ngFor="let pow of powers" [value]="pow">
          {{ pow }}
        </option>
      </select>
    </div>
    <br>
    <button type="submit" class="btn btn-success">
      Submit
    </button>
  </form>
</div>
