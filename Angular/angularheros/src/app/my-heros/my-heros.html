<p>my-heros works!</p>
<h2>My Heroes</h2>

<ul class="heroes">
    <li *ngFor="let hero of myheros">
        <button type="button" (click)="onSelect(hero)">
        <span class="badge">{{hero.id}}</span>
        <span class="name">{{hero.name}}</span>
        </button>
    </li>
</ul>

<app-hero-details myhero="selectedHero"></app-hero-details>
